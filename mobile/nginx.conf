# Nginx configuration for Playlist backend routing
# Routes /api/* to Go backend and /api/v1/merge/* to Python merge server
#
# Place this file at /etc/nginx/sites-available/playlist or similar
# Then: sudo ln -s /etc/nginx/sites-available/playlist /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name helpful-supposedly-moose.ngrok-free.app;

    # Increase body size for video uploads/merges
    client_max_body_size 500M;

    # ---- Health check ----
    location /api/health {
        proxy_pass http://127.0.0.1:8080/api/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Go Backend (primary API) ----
    # Routes: /api/v1/generate, /api/v1/singers, /api/v1/playlists, /api/v1/merged
    location /api/v1/ {
        # Check if this is a merge-related request to route to Python server
        set $backend_upstream "http://127.0.0.1:8080";

        # Route merge POST and merge file serving to Python server on port 5002
        if ($request_uri ~* "^/api/v1/merge") {
            set $backend_upstream "http://127.0.0.1:5002";
        }
        if ($request_uri ~* "^/api/v1/merged/") {
            set $backend_upstream "http://127.0.0.1:5002";
        }

        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support if needed
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ---- Direct Python Merge Server access ----
    location /merge/ {
        proxy_pass http://127.0.0.1:5002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Longer timeouts for video processing
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ---- Static files for merge output ----
    location /output/ {
        alias /path/to/backend/output/;
        add_header Access-Control-Allow-Origin *;
    }

    # ---- CORS headers for all locations ----
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

    # Handle OPTIONS preflight
    if ($request_method = OPTIONS) {
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 204;
    }

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
